spring.application.name=campus-rag

# Optional local override. Keep src/main/resources/application-local.properties untracked.
spring.config.import=optional:file:./src/main/resources/application-local.properties

# ---- 向量存储 ----
# 可选值: inmemory | chroma。默认 inmemory 向后兼容，切换到 chroma 需先启动 Docker chroma 容器。
rag.vector.store=${CAMPUS_RAG_VECTOR_STORE:inmemory}
rag.chroma.base-url=${CAMPUS_RAG_CHROMA_URL:http://localhost:8000}
rag.chroma.collection-name=${CAMPUS_RAG_CHROMA_COLLECTION:campus_rag}

# ---- RAG 检索阈值 ----
rag.retrieval.min-score=${CAMPUS_RAG_MIN_SCORE:0.65}

# ---- 混合检索 ----
# 启用向量+BM25 混合检索（false 时回退到纯向量检索）
rag.hybrid.enabled=${CAMPUS_RAG_HYBRID_ENABLED:true}

# ---- Rerank 重排序 ----
# 启用 DashScope gte-rerank 重排序（false 时跳过 Rerank 直接用 RRF 结果）
rag.rerank.enabled=${CAMPUS_RAG_RERANK_ENABLED:true}
rag.rerank.model=${CAMPUS_RAG_RERANK_MODEL:gte-rerank}

# ---- Redis 会话持久化 + 限流（Phase 3） ----
spring.data.redis.host=${CAMPUS_RAG_REDIS_HOST:localhost}
spring.data.redis.port=${CAMPUS_RAG_REDIS_PORT:6379}
spring.data.redis.timeout=5s
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# ---- 意图分类开关（Phase 3） ----
rag.intent.enabled=${CAMPUS_RAG_INTENT_ENABLED:true}

# ---- 用户级限流（Phase 3） ----
rag.rate-limit.enabled=${CAMPUS_RAG_RATE_LIMIT_ENABLED:true}
rag.rate-limit.max-per-minute=${CAMPUS_RAG_RATE_LIMIT_MAX:10}
rag.rate-limit.ttl-seconds=60

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.campus.rag.entity

# HTTP encoding
spring.servlet.encoding.enabled=true
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

# DashScope chat model
langchain4j.dashscope.chat-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.chat-model.model-name=qwen-plus
langchain4j.dashscope.chat-model.temperature=0.2

# DashScope streaming chat model
langchain4j.dashscope.streaming-chat-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.streaming-chat-model.model-name=qwen-plus
langchain4j.dashscope.streaming-chat-model.temperature=0.2

# DashScope embedding model
langchain4j.dashscope.embedding-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.embedding-model.model-name=text-embedding-v2

# File upload storage
app.upload.path=${CAMPUS_RAG_UPLOAD_PATH:D:/campus-rag-uploads}

# Auth token
# 开发环境提供默认值，正式部署时请通过环境变量覆盖。
app.auth.token-secret=${CAMPUS_RAG_TOKEN_SECRET:campus-rag-dev-token-secret-change-me}
app.auth.token-expire-seconds=${CAMPUS_RAG_TOKEN_EXPIRE_SECONDS:86400}

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${CAMPUS_RAG_DB_URL:jdbc:mysql://localhost:3306/campusrag?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${CAMPUS_RAG_DB_USERNAME:root}
spring.datasource.password=${CAMPUS_RAG_DB_PASSWORD:}
