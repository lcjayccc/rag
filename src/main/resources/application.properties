spring.application.name=campus-rag

# Optional local override. Keep src/main/resources/application-local.properties untracked.
spring.config.import=optional:file:./src/main/resources/application-local.properties

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.campus.rag.entity

# HTTP encoding
spring.servlet.encoding.enabled=true
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true

# DashScope chat model
langchain4j.dashscope.chat-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.chat-model.model-name=qwen-plus
langchain4j.dashscope.chat-model.temperature=0.2

# DashScope streaming chat model
langchain4j.dashscope.streaming-chat-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.streaming-chat-model.model-name=qwen-plus
langchain4j.dashscope.streaming-chat-model.temperature=0.2

# DashScope embedding model
langchain4j.dashscope.embedding-model.api-key=${DASHSCOPE_API_KEY:}
langchain4j.dashscope.embedding-model.model-name=text-embedding-v2

# File upload storage
app.upload.path=${CAMPUS_RAG_UPLOAD_PATH:D:/campus-rag-uploads}

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${CAMPUS_RAG_DB_URL:jdbc:mysql://localhost:3306/campusrag?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${CAMPUS_RAG_DB_USERNAME:root}
spring.datasource.password=${CAMPUS_RAG_DB_PASSWORD:}
